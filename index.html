<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prescrição Optométrica</title>

<style>
:root {
  --navy:#1a2f5a;
  --blue:#2563a8;
  --light-blue:#dbeafe;
  --accent:#3b82c4;
  --border:#c8d8ee;
  --text:#1e293b;
  --muted:#64748b;
  --bg:#f8fafc;
  --data-color:#111;
  --data-size:14px;
  --data-weight:600;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:30px 20px;
}

.page{
  background:#fff;
  width:100%;
  max-width:760px;
  box-shadow:0 4px 30px rgba(0,0,0,.1);
  position:relative;
}

/* HEADER */
.header{
  background:#f1f5f9;
  padding:28px 40px 24px;
  display:flex;
}

.header-text h1{
  font-size:22px;
  color:var(--navy);
}

.header-date{
  margin-left:auto;
  text-align:right;
}

.header-date .value{
  font-weight:600;
}

/* BODY */
.body{padding:32px 40px;}

.field-label{
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
}

.field-value{
  font-size:var(--data-size);
  font-weight:var(--data-weight);
}

/* TABLE */
.rx-table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.rx-table th{
  background:var(--navy);
  color:#fff;
  padding:10px;
}

.rx-table td{
  text-align:center;
  padding:10px;
}

/* FOOTER */
.footer{
  background:#f1f5f9;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
}

/* SIGNATURE */
.signature-area{
  text-align:center;
  padding-left:16px;
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}

/* CARIMBO */
.stamp-wrapper{
  display:none;
  margin-bottom:-8px;
  width:100%;
  display:flex;
  justify-content:center;
}

.stamp-wrapper img{
  width:180px;
  max-width:100%;
  height:auto;
  object-fit:contain;

  mix-blend-mode:multiply;
  opacity:.95;
  filter:contrast(1.1) brightness(.95);
}

.sig-name{
  font-size:13px;
  font-weight:700;
  margin-top:-4px;
  color:var(--navy);
}

.sig-role{
  font-size:10px;
  color:var(--muted);
}

/* PRINT */
.print-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  background:var(--navy);
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="page">

<div class="header">
  <div class="header-text">
    <h1>Prescrição Optométrica</h1>
  </div>
  <div class="header-date">
    <div class="value" id="data"></div>
  </div>
</div>

<div class="body">

<div>
  <div class="field-label">Paciente</div>
  <div class="field-value" id="paciente"></div>
</div>

<table class="rx-table">
<thead>
<tr>
<th></th>
<th>Esférico</th>
<th>Cilíndrico</th>
<th>Eixo</th>
</tr>
</thead>
<tbody>
<tr>
<td>OD</td>
<td id="esf-od"></td>
<td id="cil-od"></td>
<td id="eixo-od"></td>
</tr>
<tr>
<td>OE</td>
<td id="esf-oe"></td>
<td id="cil-oe"></td>
<td id="eixo-oe"></td>
</tr>
</tbody>
</table>

</div>

<div class="footer">

<div>
Documento técnico optométrico.
</div>

<div class="signature-area">

<div class="stamp-wrapper" id="stamp-wrapper">
  <img id="stamp-img">
</div>

<div class="sig-name" id="sig-name"></div>
<div class="sig-role">Optometrista</div>

</div>

</div>

</div>

<button class="print-btn" onclick="window.print()">Imprimir</button>

<script>
function getParam(name){
  return new URL(window.location.href).searchParams.get(name)||'';
}

function set(id,val){
  document.getElementById(id).textContent=val||'—';
}

set('data',new Date().toLocaleDateString('pt-BR'));
set('paciente',getParam('paciente'));
set('sig-name',getParam('optometrista'));

set('esf-od',getParam('esf_od'));
set('cil-od',getParam('cil_od'));
set('eixo-od',getParam('eixo_od'));

set('esf-oe',getParam('esf_oe'));
set('cil-oe',getParam('cil_oe'));
set('eixo-oe',getParam('eixo_oe'));

/* CARIMBO */
(function(){
  const raw=getParam('carimbo');
  if(!raw)return;

  const match=raw.match(/[-\w]{25,}/);
  if(!match)return;

  const fileId=match[0];
  const img=document.getElementById('stamp-img');
  const wrapper=document.getElementById('stamp-wrapper');

  img.src=`https://lh3.googleusercontent.com/d/${fileId}`;

  img.onload=()=>wrapper.style.display='flex';
})();
</script>

</body>
</html>
